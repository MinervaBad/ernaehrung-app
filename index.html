<style>
:root {
  --cream:#faf6f0; --warm:#fff9f2;
  --sage:#7a9e7e; --sage-dark:#4a7050; --sage-light:#a8c5ab;
  --gold:#c9a84c; --gold-light:#f0d898;
  --terracotta:#c4714a;
  --dark:#2c2416; --mid:#6b5b3e; --line:#e8ddd0;
  --red:#b03030; --red-light:#fdeaea;
  --alex:#1a3a5c; --alex-light:#d4e4f4; --alex-mid:#2d5f8a;
  --ina:#4a7050; --ina-light:#d4ead6;
  --keto:#8b4513; --keto-light:#f5e6d8;
  --both:#6b5b3e; --both-light:#f0ead8;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;}
body{background:var(--cream);font-family:'DM Sans',sans-serif;color:var(--dark);display:flex;flex-direction:column;}

/* PROFILE SWITCHER */
.profile-bar{background:var(--dark);display:flex;align-items:center;padding:8px 16px;gap:8px;flex-shrink:0;}
.profile-label{font-size:10px;color:rgba(255,255,255,0.4);text-transform:uppercase;letter-spacing:1px;margin-right:4px;}
.profile-btn{padding:6px 16px;border-radius:20px;border:none;font-size:12px;font-family:'DM Sans',sans-serif;font-weight:500;cursor:pointer;transition:all 0.2s;}
.profile-btn.ina{background:rgba(74,112,80,0.2);color:var(--sage-light);}
.profile-btn.ina.active{background:var(--sage-dark);color:#fff;}
.profile-btn.alex{background:rgba(26,58,92,0.2);color:var(--alex-light);}
.profile-btn.alex.active{background:var(--alex-mid);color:#fff;}
.profile-btn.both{background:rgba(107,91,62,0.2);color:#d4c4a0;}
.profile-btn.both.active{background:var(--both);color:#fff;}

/* NAV */
.nav{background:var(--sage-dark);display:flex;border-bottom:2px solid rgba(255,255,255,0.1);flex-shrink:0;}
.nav.alex-mode{background:var(--alex);}
.nav.both-mode{background:var(--both);}
.nav-btn{flex:1;padding:12px 4px 8px;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;border:none;background:transparent;color:rgba(255,255,255,0.5);font-size:9px;font-family:'DM Sans',sans-serif;letter-spacing:0.5px;text-transform:uppercase;transition:all 0.2s;}
.nav-btn .icon{font-size:19px;}
.nav-btn.active{color:#fff;background:rgba(255,255,255,0.1);}

/* SCREENS */
.screen{display:none;flex:1;overflow-y:auto;flex-direction:column;}
.screen.active{display:flex;}

/* HEADER */
.screen-header{padding:16px 16px 12px;flex-shrink:0;}
.screen-header.ina-header{background:var(--sage-dark);}
.screen-header.alex-header{background:var(--alex);}
.screen-header.both-header{background:var(--both);}
.screen-header h1{font-family:'Playfair Display',serif;font-size:20px;color:#fff;margin-bottom:2px;}
.screen-header h1 em{color:var(--gold-light);font-style:italic;}
.screen-header p{font-size:11px;color:rgba(255,255,255,0.6);}
.profile-badge{display:inline-flex;align-items:center;gap:5px;font-size:11px;padding:3px 10px;border-radius:12px;margin-bottom:6px;}
.badge-ina{background:rgba(255,255,255,0.15);color:#fff;}
.badge-alex{background:rgba(255,255,255,0.15);color:#fff;}
.badge-both{background:rgba(255,255,255,0.15);color:#fff;}

/* KETO BADGE */
.keto-badge{display:inline-flex;align-items:center;gap:4px;font-size:10px;background:var(--keto-light);color:var(--keto);padding:2px 8px;border-radius:4px;font-weight:500;}
.both-badge{display:inline-flex;align-items:center;gap:4px;font-size:10px;background:var(--both-light);color:var(--both);padding:2px 8px;border-radius:4px;font-weight:500;}
.ina-only-badge{display:inline-flex;align-items:center;gap:4px;font-size:10px;background:var(--ina-light);color:var(--ina);padding:2px 8px;border-radius:4px;font-weight:500;}

/* FILTER BAR */
.filter-bar{display:flex;gap:7px;padding:10px 16px;overflow-x:auto;flex-shrink:0;background:var(--warm);border-bottom:1px solid var(--line);}
.filter-bar::-webkit-scrollbar{display:none;}
.filter-btn{white-space:nowrap;padding:5px 12px;border-radius:20px;border:1px solid var(--line);background:var(--warm);color:var(--mid);font-size:11px;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all 0.2s;flex-shrink:0;}
.filter-btn.active{background:var(--sage-dark);color:#fff;border-color:var(--sage-dark);}
.filter-btn.active.alex-active{background:var(--alex-mid);border-color:var(--alex-mid);}

/* REZEPT CARDS */
.rezepte-list{padding:0 16px 8px;display:flex;flex-direction:column;gap:8px;}
.rezept-section-title{font-family:'Playfair Display',serif;font-size:15px;padding:12px 16px 6px;color:var(--dark);}
.rezept-section-title.red{color:var(--red);}
.rezept-card{background:var(--warm);border:1px solid var(--line);border-radius:13px;overflow:hidden;cursor:pointer;transition:transform 0.15s;position:relative;}
.rezept-card:active{transform:scale(0.98);}
.rezept-card.keto-card{border-color:rgba(139,69,19,0.25);}
.rezept-card.both-card{border-color:rgba(107,91,62,0.25);}
.rezept-card.abgelehnt-card{opacity:0.5;}
.rezept-card-inner{padding:12px;}
.rezept-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:5px;}
.rezept-name{font-family:'Playfair Display',serif;font-size:14px;color:var(--dark);flex:1;margin-right:6px;}

  <!-- Firebase -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getFirestore, doc, setDoc, getDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCztPmShJyELZjPy0t4_TYxd7ymCdfAZ4",
      authDomain: "ina-alex-ernaehrung.firebaseapp.com",
      projectId: "ina-alex-ernaehrung",
      storageBucket: "ina-alex-ernaehrung.firebasestorage.app",
      messagingSenderId: "277671893545",
      appId: "1:277671893545:web:5f303f45efb1521b9f1a38"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // =====================
    // FIREBASE SYNC
    // =====================
    const DOC_ID = "shared-data";
    const COLL = "ernaehrung";
    let isSaving = false;
    let syncStatus = document.getElementById('sync-status');

    function showSyncStatus(msg, color) {
      if(!syncStatus) syncStatus = document.getElementById('sync-status');
      if(syncStatus) {
        syncStatus.textContent = msg;
        syncStatus.style.background = color;
        syncStatus.style.display = 'flex';
        if(color === '#4a7050') setTimeout(()=>{ syncStatus.style.display='none'; }, 2000);
      }
    }

    async function saveToFirebase() {
      if(isSaving) return;
      isSaving = true;
      showSyncStatus('⏫ Wird gespeichert...', '#c9a84c');
      try {
        const data = {
          prefsIna: window._prefsIna || {},
          prefsAlex: window._prefsAlex || {},
          wochenplanIna: JSON.parse(JSON.stringify(window._wochenplanIna || {})),
          wochenplanAlex: JSON.parse(JSON.stringify(window._wochenplanAlex || {})),
          updatedAt: Date.now()
        };
        // Strip recipe objects to just IDs for storage
        ['wochenplanIna','wochenplanAlex'].forEach(key => {
          Object.keys(data[key]).forEach(tag => {
            ['fruehstueck','snack','mittag','abend'].forEach(slot => {
              if(data[key][tag][slot]) {
                data[key][tag][slot] = { id: data[key][tag][slot].id };
              }
            });
          });
        });
        await setDoc(doc(db, COLL, DOC_ID), data);
        showSyncStatus('✓ Gespeichert & synchronisiert', '#4a7050');
      } catch(e) {
        showSyncStatus('⚠️ Fehler beim Speichern', '#b03030');
        console.error(e);
      }
      isSaving = false;
    }

    function restoreFromData(data) {
      if(!data) return;
      // Update BOTH window vars AND the actual app variables
      if(data.prefsIna) {
        window._prefsIna = data.prefsIna;
        // Update actual prefsIna variable in app scope
        window.syncPrefsIna(data.prefsIna);
      }
      if(data.prefsAlex) {
        window._prefsAlex = data.prefsAlex;
        window.syncPrefsAlex(data.prefsAlex);
      }
      // Restore full recipe objects from IDs
      ['wochenplanIna','wochenplanAlex'].forEach(key => {
        const planKey = key === 'wochenplanIna' ? '_wochenplanIna' : '_wochenplanAlex';
        if(data[key]) {
          const plan = data[key];
          window[planKey] = {};
          Object.keys(plan).forEach(tag => {
            window[planKey][tag] = {};
            ['fruehstueck','snack','mittag','abend'].forEach(slot => {
              if(plan[tag][slot] && plan[tag][slot].id) {
                const rezept = (window.alleRezepte||[]).find(r=>r.id===plan[tag][slot].id);
                window[planKey][tag][slot] = rezept || null;
              } else {
                window[planKey][tag][slot] = null;
              }
            });
          });
          // Sync to actual app variable
          if(key === 'wochenplanIna') window.syncWochenplanIna(window[planKey]);
          else window.syncWochenplanAlex(window[planKey]);
        }
      });
    }

    // Listen for real-time changes
    onSnapshot(doc(db, COLL, DOC_ID), (snapshot) => {
      if(snapshot.exists()) {
        const data = snapshot.data();
        restoreFromData(data);
        showSyncStatus('🔄 Aktualisiert', '#2d5f8a');
        // Re-render current screen
        const activeScreen = document.querySelector('.screen.active')?.id?.replace('screen-','');
        if(activeScreen && window['render'+activeScreen.charAt(0).toUpperCase()+activeScreen.slice(1)]) {
          window['render'+activeScreen.charAt(0).toUpperCase()+activeScreen.slice(1)]();
        }
      }
    });

    // Load initial data
    getDoc(doc(db, COLL, DOC_ID)).then(snapshot => {
      if(snapshot.exists()) {
        restoreFromData(snapshot.data());
        showSyncStatus('✓ Daten geladen', '#4a7050');
        window.renderRezepte && window.renderRezepte();
        window.renderPlaner && window.renderPlaner();
      } else {
        showSyncStatus('✓ Bereit — neue Daten', '#4a7050');
      }
    });

    // Expose save function globally
    window.saveToFirebase = saveToFirebase;
  </script>

const tage = ['Montag','Dienstag','Mittwoch','Donnerstag','Freitag','Samstag','Sonntag'];
const tagKlassen = ['mon','tue','wed','thu','fri','sat','sun'];
const slots = ['fruehstueck','snack','mittag','abend'];
const slotLabels = {fruehstueck:'🌅 Frühstück',snack:'🍫 Snack',mittag:'🥡 Mittag',abend:'🌙 Abend'};

let currentProfile = 'ina'; // 'ina' | 'alex' | 'both'
let currentFilter = 'alle';
let prefsIna = {};
let prefsAlex = {};
let wochenplanIna = {};
let wochenplanAlex = {};
tage.forEach(t => {
  wochenplanIna[t] = {fruehstueck:null,snack:null,mittag:null,abend:null};
  wochenplanAlex[t] = {fruehstueck:null,snack:null,mittag:null,abend:null};
});
let checkedItems = {};
let currentSlotDay = null;
let currentSlotType = null;

try {
  const pi = localStorage.getItem('ina_prefs_v2'); if(pi) prefsIna = JSON.parse(pi);
  const pa = localStorage.getItem('alex_prefs_v2'); if(pa) prefsAlex = JSON.parse(pa);
  const wi = localStorage.getItem('ina_plan_v2'); if(wi) { const p=JSON.parse(wi); tage.forEach(t=>{if(p[t]) wochenplanIna[t]=p[t];}); }
  const wa = localStorage.getItem('alex_plan_v2'); if(wa) { const p=JSON.parse(wa); tage.forEach(t=>{if(p[t]) wochenplanAlex[t]=p[t];}); }
} catch(e){}

function savePrefs() {
  try { localStorage.setItem('ina_prefs_v2', JSON.stringify(prefsIna)); localStorage.setItem('alex_prefs_v2', JSON.stringify(prefsAlex)); } catch(e){}
  window._prefsIna = prefsIna; window._prefsAlex = prefsAlex;
  if(window.saveToFirebase) window.saveToFirebase();
}
function savePlan() {
  try { localStorage.setItem('ina_plan_v2', JSON.stringify(wochenplanIna)); localStorage.setItem('alex_plan_v2', JSON.stringify(wochenplanAlex)); } catch(e){}
  window._wochenplanIna = wochenplanIna; window._wochenplanAlex = wochenplanAlex;
  if(window.saveToFirebase) window.saveToFirebase();
}

function getPrefs() { return currentProfile==='alex' ? prefsAlex : prefsIna; }
function getPlan() { return currentProfile==='alex' ? wochenplanAlex : wochenplanIna; }

function getProfileRezepte() {
  if (currentProfile==='ina') return alleRezepte.filter(r => r.fuer==='ina' || r.fuer==='beide');
  if (currentProfile==='alex') return alleRezepte.filter(r => r.fuer==='alex' || r.fuer==='beide');
  return alleRezepte.filter(r => r.fuer==='beide');
}

function setProfile(p) {
  currentProfile = p;
  document.querySelectorAll('.profile-btn').forEach(b => b.classList.remove('active'));
  document.querySelector('.profile-btn.'+p).classList.add('active');
  const nav = document.getElementById('main-nav');
  nav.className = 'nav' + (p==='alex' ? ' alex-mode' : p==='both' ? ' both-mode' : '');
  const activeScreen = document.querySelector('.screen.active')?.id?.replace('screen-','');
  if (activeScreen) showScreen(activeScreen);
}

// =====================
// SCREENS
// =====================
function showScreen(name) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('screen-'+name).classList.add('active');
  document.getElementById('nav-'+name).classList.add('active');
  if(name==='entdecken') renderEntdecken();
  if(name==='rezepte') renderRezepte();
  if(name==='planer') renderPlaner();
  if(name==='einkauf') renderShopping();
}

// =====================
function renderEntdecken() {
  const screen = document.getElementById('screen-entdecken');
  const profs = currentProfile==='both' ? [] : getProfileRezepte();
  const prefs = getPrefs();
  const unrated = profs.filter(r => !prefs[r.id]);
  const isAlex = currentProfile==='alex';
  const headerClass = currentProfile==='alex' ? 'alex-header' : currentProfile==='both' ? 'both-header' : 'ina-header';
  const profileName = currentProfile==='alex' ? '💪 Alex' : '🌿 Ina';

  if (currentProfile==='both') {
    screen.innerHTML = `
      <div class="screen-header ${headerClass}">
        <div class="profile-badge badge-both">👫 Beide</div>
        <h1>Entdecken</h1>
        <p>Wähle ein Profil (Ina oder Alex) um Rezepte zu bewerten</p>
      </div>
      <div style="text-align:center;padding:40px 20px;color:var(--mid);">
        <div style="font-size:48px;margin-bottom:12px;">👫</div>
        <p style="font-size:13px;line-height:1.7;">Wechsle zu <strong>🌿 Ina</strong> oder <strong>💪 Alex</strong> oben, um Rezepte einzeln zu bewerten.</p>
      </div>`;
    return;
  }

  if (unrated.length === 0) {
    const liked = profs.filter(r => prefs[r.id]==='liked').length;
    const disliked = profs.filter(r => prefs[r.id]==='disliked').length;
    screen.innerHTML = `
      <div class="screen-header ${headerClass}">
        <div class="profile-badge badge-${currentProfile}">${profileName}</div>
        <h1>Alle bewertet! 🎉</h1>
        <p>Deine Lieblingsrezepte warten im Rezepte-Tab</p>
      </div>
      <div class="onboarding-done">
        <div class="big-emoji">🎉</div>
        <h2>Fertig, ${isAlex?'Alex':'Ina'}!</h2>
        <p>${isAlex?'Alle Keto-Rezepte bewertet.':'Alle Rezepte bewertet.'}</p>
        <div class="done-stats">
          <div class="done-stat liked ${isAlex?'alex':''}"><div class="done-stat-num">❤️ ${liked}</div><div class="done-stat-label">Mag ich</div></div>
          <div class="done-stat disliked"><div class="done-stat-num">👎 ${disliked}</div><div class="done-stat-label">Mag nicht</div></div>
        </div>
        <button class="start-btn ${isAlex?'alex':''}" onclick="showScreen('rezepte')">Zu meinen Rezepten →</button>
        <button class="redo-btn" onclick="resetPrefs()">Neu bewerten</button>
      </div>`;
    return;
  }

  const total = profs.length;
  const rated = total - unrated.length;
  const r = unrated[0];
  screen.innerHTML = `
    <div class="screen-header ${headerClass}">
      <div class="profile-badge badge-${currentProfile}">${profileName}</div>
      <h1>Rezepte <em>entdecken</em></h1>
      <p>❤️ Mag ich &nbsp;·&nbsp; 👎 Mag ich nicht</p>
    </div>
    <div class="swipe-screen">
      <div class="swipe-progress"><div class="swipe-progress-bar ${isAlex?'alex-bar':'ina-bar'}" style="width:${(rated/total)*100}%"></div></div>
      <div class="swipe-counter">${rated} von ${total} bewertet</div>
      <div class="swipe-card-container">
        <div class="swipe-card" id="swipe-card">
          <span class="swipe-card-type type-${r.type} rezept-type">${slotLabels[r.type]}</span>
          ${r.ketoOk ? '<span class="keto-badge" style="margin-left:6px;">Keto ✓</span>' : ''}
          <div class="swipe-card-name">${r.name}</div>
          <div class="swipe-card-desc">${r.desc}</div>
          <div class="swipe-card-tags">${r.tags.map(t=>`<span class="swipe-card-tag ${t.includes('Keto')?'keto':''}">${t}</span>`).join('')}</div>
          <div class="swipe-card-zutaten"><strong>Zutaten</strong>${r.zutaten.join(' · ')}</div>
          ${r.ketoTipp && isAlex ? `<div style="background:var(--keto-light);border-radius:8px;padding:9px;margin-top:8px;font-size:11px;color:var(--keto);">💪 ${r.ketoTipp}</div>` : ''}
        </div>
      </div>
      <div class="swipe-btns">
        <button class="swipe-btn btn-dislike" onclick="rateRezept(${r.id},'disliked')">👎</button>
        <button class="swipe-btn btn-like ${isAlex?'alex':''}" onclick="rateRezept(${r.id},'liked')">❤️</button>
      </div>
      <div class="swipe-hint">👎 Mag ich nicht &nbsp;&nbsp; ❤️ Mag ich</div>
    </div>`;
}

function rateRezept(id, rating) {
  const card = document.getElementById('swipe-card');
  if(card) {
    card.classList.add(rating==='liked'?'leaving-right':'leaving-left');
    setTimeout(()=>{
      if(currentProfile==='alex') prefsAlex[id]=rating;
      else prefsIna[id]=rating;
      savePrefs();
      renderEntdecken();
    },270);
  }
}

function resetPrefs() {
  if(currentProfile==='alex') prefsAlex={};
  else prefsIna={};
  savePrefs();
  renderEntdecken();
}

function filterRezepte(type, btn) {
  currentFilter=type;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderRezepte();
}

function renderRezepte() {
  const screen = document.getElementById('screen-rezepte');
  const isAlex = currentProfile==='alex';
  const isBoth = currentProfile==='both';
  const prefs = getPrefs();
  const headerClass = isAlex?'alex-header':isBoth?'both-header':'ina-header';
  const profileName = isAlex?'💪 Alex':isBoth?'👫 Beide':'🌿 Ina';

  let rezepte = getProfileRezepte();
  if (currentFilter==='abgelehnt') {
    const abgelehnt = rezepte.filter(r=>prefs[r.id]==='disliked');
    screen.innerHTML = `
      <div class="screen-header ${headerClass}"><div class="profile-badge badge-${currentProfile}">${profileName}</div><h1>Inas <em>Rezepte</em></h1><p>Abgelehnte Rezepte</p></div>
      ${filterBarHTML()}
      ${abgelehnt.length===0?'<div class="empty-section">Keine abgelehnten Rezepte 🎉</div>':'<div class="rezept-section-title red">👎 Abgelehnte Rezepte</div><div class="rezepte-list">'+abgelehnt.map(r=>rezeptCardHTML(r)).join('')+'</div>'}`;
    return;
  }

  if (currentFilter !== 'alle') rezepte = rezepte.filter(r=>r.type===currentFilter);

  const liked = rezepte.filter(r=>prefs[r.id]==='liked');
  const unrated = rezepte.filter(r=>!prefs[r.id]);
  let content = '';
  if(liked.length>0) content+=`<div class="rezept-section-title">❤️ Meine Lieblinge</div><div class="rezepte-list">${liked.map(r=>rezeptCardHTML(r)).join('')}</div>`;
  if(unrated.length>0) content+=`<div class="rezept-section-title" style="color:var(--mid)">✨ Alle Rezepte</div><div class="rezepte-list">${unrated.map(r=>rezeptCardHTML(r)).join('')}</div>`;
  if(!content) content=`<div class="empty-section">Keine Rezepte — geh zu ✨ Entdecken!</div>`;

  const infoText = isAlex ? '💪 Alle Rezepte sind Keto-kompatibel. Abendessen teilt ihr euch — mit kleinen Anpassungen.' : isBoth ? '👫 Alle gemeinsamen Abendessen — kocht einmal für beide!' : '🌿 Inas Rezepte — Frühstück, Mittag, Snack & Abendessen.';
  const infoClass = isAlex?'alex':isBoth?'both':'ina';

  screen.innerHTML = `
    <div class="screen-header ${headerClass}"><div class="profile-badge badge-${currentProfile}">${profileName}</div><h1>${isAlex?'Alex':'Inas'} <em>Rezepte</em></h1><p>${isAlex?'Keto · Strikte 20g KH':'Darmaufbau · Oxalatarm · LP(a)-freundlich'}</p></div>
    <div class="info-box ${infoClass}">${infoText}</div>
    ${filterBarHTML()}
    ${content}`;
}

function filterBarHTML() {
  const isAlex = currentProfile==='alex';
  return `<div class="filter-bar">
    <button class="filter-btn ${currentFilter==='alle'?'active':''}" onclick="filterRezepte('alle',this)">Alle</button>
    <button class="filter-btn ${currentFilter==='fruehstueck'?'active':''}" onclick="filterRezepte('fruehstueck',this)">🌅 Frühstück</button>
    <button class="filter-btn ${currentFilter==='mittag'?'active':''}" onclick="filterRezepte('mittag',this)">🥡 Mittag</button>
    <button class="filter-btn ${currentFilter==='abend'?'active':''}" onclick="filterRezepte('abend',this)">🌙 Abend</button>
    <button class="filter-btn ${currentFilter==='snack'?'active':''}" onclick="filterRezepte('snack',this)">🍫 Snack</button>
    ${currentProfile!=='both'?`<button class="filter-btn ${currentFilter==='abgelehnt'?'active':''}" onclick="filterRezepte('abgelehnt',this)">👎 Abgelehnt</button>`:''}
  </div>`;
}

function rezeptCardHTML(r) {
  const prefs = getPrefs();
  const isAlex = currentProfile==='alex';
  const badge = prefs[r.id]==='liked'?'❤️':prefs[r.id]==='disliked'?'👎':'';
  const ketoClass = r.ketoOk?'keto-card':'';
  const bothClass = r.fuer==='beide'?'both-card':'';
  return `
    <div class="rezept-card ${ketoClass} ${bothClass}" onclick="openModal(${r.id})">
      <div class="rezept-card-inner">
        <div class="rezept-top">
          <div class="rezept-name">${r.name}</div>
          <span class="rezept-type type-${r.type}">${slotLabels[r.type]}</span>
        </div>
        <div class="rezept-desc">${r.desc}</div>
        <div class="rezept-tags">
          ${r.tags.map(t=>`<span class="rezept-tag ${t.includes('Keto')?'keto-tag':''}">${t}</span>`).join('')}
          ${r.fuer==='beide'?'<span class="both-badge">👫 Für beide</span>':''}
          ${r.ketoOk&&isAlex?'<span class="keto-badge">Keto ✓</span>':''}
        </div>
        ${r.ketoTipp&&isAlex?`<div class="keto-anpassung"><div class="keto-anpassung-title">💪 Alex Keto-Anpassung</div><div class="keto-anpassung-text">${r.ketoTipp}</div></div>`:''}
      </div>
      ${badge?`<div class="like-badge">${badge}</div>`:''}
    </div>`;
}

function openModal(id) {
  const r = alleRezepte.find(x=>x.id===id);
  const prefs = getPrefs();
  const isLiked = prefs[r.id]==='liked';
  const isDisliked = prefs[r.id]==='disliked';
  const isAlex = currentProfile==='alex';
  document.getElementById('modal-body').innerHTML = `
    <span class="rezept-type type-${r.type}" style="display:inline-block;margin-bottom:8px;">${slotLabels[r.type]}</span>
    ${r.fuer==='beide'?'<span class="both-badge" style="margin-left:6px;">👫 Für beide</span>':''}
    ${r.ketoOk?'<span class="keto-badge" style="margin-left:6px;">Keto ✓</span>':''}
    <div class="modal-title">${r.name}</div>
    <div class="modal-section"><div class="modal-section-title">Beschreibung</div><div class="modal-desc">${r.desc}</div></div>
    <div class="modal-section"><div class="modal-section-title">Zutaten</div><div class="ingredient-list">${r.zutaten.map(z=>`<div class="ingredient">${z}</div>`).join('')}</div></div>
    <div class="modal-section"><div class="modal-section-title">Zubereitung</div><div class="modal-prep">${r.zubereitung.replace(/\n/g,'<br>')}<br><br><strong>${r.prep}</strong></div></div>
    ${r.ketoTipp?`<div class="modal-keto-box"><div class="modal-keto-title">💪 Keto-Anpassung für Alex</div><div class="modal-keto-text">${r.ketoTipp}</div></div>`:''}
    <div class="modal-btns">
      <button class="modal-btn modal-btn-like ${isAlex?'alex-like':''} ${isLiked?'active':''}" onclick="togglePref(${r.id},'liked')">❤️ Mag ich${isLiked?' ✓':''}</button>
      <button class="modal-btn modal-btn-dislike ${isDisliked?'active':''}" onclick="togglePref(${r.id},'disliked')">👎 Mag nicht${isDisliked?' ✓':''}</button>
    </div>
    <button class="add-to-plan-btn ${isAlex?'alex-btn':''}" onclick="openSlotPickerFromModal(${r.id})" ${isDisliked?'disabled':''}>➕ Zum Wochenplan hinzufügen</button>`;
  document.getElementById('modal-overlay').classList.add('open');
}

function togglePref(id, rating) {
  if(currentProfile==='alex') prefsAlex[id]=prefsAlex[id]===rating?null:rating;
  else prefsIna[id]=prefsIna[id]===rating?null:rating;
  savePrefs();
  openModal(id);
  renderRezepte();
}

function closeModal(e) {
  if(e.target===document.getElementById('modal-overlay')) document.getElementById('modal-overlay').classList.remove('open');
}

function openSlotPickerFromModal(id) {
  document.getElementById('modal-overlay').classList.remove('open');
  const r = alleRezepte.find(x=>x.id===id);
  currentSlotType = r.type;
  document.getElementById('slot-picker-title').textContent = `Welcher Tag? · ${slotLabels[r.type]}`;
  document.getElementById('slot-picker-list').innerHTML = tage.map(tag=>`
    <div class="slot-picker-item" onclick="assignRezept('${tag}','${r.type}',${r.id})">
      <div class="slot-picker-item-name">${tag}</div>
      <div class="slot-picker-item-desc">${getPlan()[tag][r.type]?'⚠️ Ersetzt: '+getPlan()[tag][r.type].name:'✓ Frei'}</div>
    </div>`).join('');
  document.getElementById('slot-picker').classList.add('open');
}

function assignRezept(tag, type, id) {
  const r = alleRezepte.find(x=>x.id===id);
  if(currentProfile==='alex'||currentProfile==='both') wochenplanAlex[tag][type]=r;
  if(currentProfile==='ina'||currentProfile==='both') wochenplanIna[tag][type]=r;
  savePlan();
  document.getElementById('slot-picker').classList.remove('open');
  renderPlaner();
  showScreen('planer');
}

function renderPlaner() {
  const screen = document.getElementById('screen-planer');

  const profileName = isAlex?'💪 Alex':isBoth?'👫 Beide':'🌿 Ina';

  let planHTML = tage.map((tag,i)=>{
    const planIna = wochenplanIna[tag];
    const planAlex = wochenplanAlex[tag];
    const planCurrent = isAlex?planAlex:planIna;
    const filled = slots.filter(s=>planCurrent[s]).length;
    return `
    <div class="day-planner">
      <div class="day-planner-header ${tagKlassen[i]}">
        <div class="day-planner-name">${tag}</div>
        <div class="day-planner-count">${filled}/4 Mahlzeiten</div>
      </div>
      <div class="day-meals">
        ${slots.map(slot=>{
          const mealIna = planIna[slot];
          const mealAlex = planAlex[slot];
          if(isBoth) {
            // Show both
            if(mealIna&&mealAlex&&mealIna.id===mealAlex.id) {
              return `<div class="day-meal-slot filled both-filled">
                <span class="slot-type">${slotLabels[slot]}</span>
                <span class="slot-name">${mealIna.name}</span>
                <span class="slot-who both">👫</span>
                <button class="slot-remove" onclick="removeSlot('${tag}','${slot}','both')">✕</button>
              </div>`;
            }
            let r='';
            if(mealIna) r+=`<div class="day-meal-slot filled" style="margin-bottom:3px;">
              <span class="slot-type">${slotLabels[slot]}</span>
              <span class="slot-name">${mealIna.name}</span>
              <span class="slot-who ina">Ina</span>
              <button class="slot-remove" onclick="removeSlot('${tag}','${slot}','ina')">✕</button>
            </div>`;
            if(mealAlex) r+=`<div class="day-meal-slot filled alex-filled">
              <span class="slot-type">${slotLabels[slot]}</span>
              <span class="slot-name">${mealAlex.name}</span>
              <span class="slot-who alex">Alex</span>
              <button class="slot-remove" onclick="removeSlot('${tag}','${slot}','alex')">✕</button>
            </div>`;
            if(!mealIna&&!mealAlex) r=`<div class="day-meal-slot" onclick="openSlotPicker('${tag}','${slot}')">
              <span class="slot-type">${slotLabels[slot]}</span>
              <span class="slot-empty">Tippen zum Hinzufügen</span>
            </div>`;
            return r;
          }
          const meal = planCurrent[slot];
          if(meal) return `<div class="day-meal-slot filled ${isAlex?'alex-filled':''}">
            <span class="slot-type">${slotLabels[slot]}</span>
            <span class="slot-name">${meal.name}</span>
            ${meal.ketoOk&&isAlex?'<span class="slot-who alex">Keto ✓</span>':''}
            <button class="slot-remove" onclick="removeSlot('${tag}','${slot}','${currentProfile}')">✕</button>
          </div>`;
          return `<div class="day-meal-slot" onclick="openSlotPicker('${tag}','${slot}')">
            <span class="slot-type">${slotLabels[slot]}</span>
            <span class="slot-empty">Tippen zum Hinzufügen</span>
          </div>`;
        }).join('')}
      </div>
    </div>`;
  }).join('');

  screen.innerHTML = `
    <div class="screen-header ${headerClass}"><div class="profile-badge badge-${currentProfile}">${profileName}</div><h1>Dein <em>Wochenplan</em></h1><p>Tippe auf einen Slot um ein Rezept zuzuweisen</p></div>
    <div class="week-planner">${planHTML}</div>`;
}

function openSlotPicker(tag, type) {
  currentSlotDay=tag;
  currentSlotType=type;
  const isAlex = currentProfile==='alex';
  const prefs = getPrefs();
  const rezepte = getProfileRezepte().filter(r=>r.type===type);
  const liked = rezepte.filter(r=>prefs[r.id]==='liked');
  const unrated = rezepte.filter(r=>!prefs[r.id]);
  let html='';
  if(liked.length>0){html+=`<div class="slot-picker-section ${isAlex?'sp-alex':'sp-ina'}">❤️ Meine Lieblinge</div>`;html+=liked.map(r=>`<div class="slot-picker-item" onclick="assignFromPlaner(${r.id})"><div class="slot-picker-item-name">${r.name} ${r.ketoOk?'<span style="font-size:10px;color:var(--keto);">Keto ✓</span>':''}</div><div class="slot-picker-item-desc">${r.desc.substring(0,55)}...</div></div>`).join('');}
  if(unrated.length>0){html+=`<div class="slot-picker-section sp-both">✨ Alle</div>`;html+=unrated.map(r=>`<div class="slot-picker-item" onclick="assignFromPlaner(${r.id})"><div class="slot-picker-item-name">${r.name} ${r.ketoOk?'<span style="font-size:10px;color:var(--keto);">Keto ✓</span>':''}</div><div class="slot-picker-item-desc">${r.desc.substring(0,55)}...</div></div>`).join('');}
  document.getElementById('slot-picker-title').textContent=`${tag} · ${slotLabels[type]}`;
  document.getElementById('slot-picker-list').innerHTML=html;
  document.getElementById('slot-picker').classList.add('open');
}

function assignFromPlaner(id) {
  const r = alleRezepte.find(x=>x.id===id);
  if(currentProfile==='alex') wochenplanAlex[currentSlotDay][currentSlotType]=r;
  else if(currentProfile==='ina') wochenplanIna[currentSlotDay][currentSlotType]=r;
  else { wochenplanIna[currentSlotDay][currentSlotType]=r; wochenplanAlex[currentSlotDay][currentSlotType]=r; }
  savePlan();
  document.getElementById('slot-picker').classList.remove('open');
  renderPlaner();
}

function removeSlot(tag,type,who) {
  if(who==='ina'||who==='both') wochenplanIna[tag][type]=null;
  if(who==='alex'||who==='both') wochenplanAlex[tag][type]=null;
  savePlan();
  renderPlaner();
}

function closeSlotPicker(e) {
  if(e.target===document.getElementById('slot-picker')) document.getElementById('slot-picker').classList.remove('open');
}

// =====================
// EINKAUFSLISTE
// =====================
function renderShopping() {
  const screen = document.getElementById('screen-einkauf');
  const isAlex = currentProfile==='alex';
  const isBoth = currentProfile==='both';
  const headerClass = isAlex?'alex-header':isBoth?'both-header':'ina-header';
  const profileName = isAlex?'💪 Alex':isBoth?'👫 Beide':'🌿 Ina';

  let plans = [];
  if(!isAlex) plans=plans.concat(Object.values(wochenplanIna).flatMap(day=>slots.map(s=>day[s]).filter(Boolean)));
  if(isAlex||isBoth) plans=plans.concat(Object.values(wochenplanAlex).flatMap(day=>slots.map(s=>day[s]).filter(Boolean)));
  // Deduplicate by id
  const seen=new Set();
  const allMeals=plans.filter(m=>{if(seen.has(m.id))return false;seen.add(m.id);return true;});

  screen.innerHTML = `<div class="screen-header ${headerClass}"><div class="profile-badge badge-${currentProfile}">${profileName}</div><h1>Einkaufs<em>liste</em></h1><p>Automatisch aus dem Wochenplan</p></div><div id="shopping-inner" style="padding:11px 16px;"></div>`;

  const inner = document.getElementById('shopping-inner');
  if(allMeals.length===0){inner.innerHTML=`<div class="shopping-empty"><div class="emoji">🛒</div><p>Plane zuerst den Wochenplan — dann erscheint die Einkaufsliste hier automatisch!</p></div>`;return;}

  const merged={};
  allMeals.forEach(meal=>{Object.entries(meal.einkauf).forEach(([cat,items])=>{if(!merged[cat])merged[cat]={};items.forEach(item=>{merged[cat][item]=(merged[cat][item]||0)+1;});});});

  const inaCount=Object.values(wochenplanIna).flatMap(d=>slots.map(s=>d[s]).filter(Boolean)).length;
  const alexCount=Object.values(wochenplanAlex).flatMap(d=>slots.map(s=>d[s]).filter(Boolean)).length;
  const summaryClass=isBoth?'both-summary':isAlex?'alex-summary':'ina-summary';
  let summaryText=`📅 Wochenplan: `;
  if(!isAlex) summaryText+=`🌿 Ina: ${inaCount} Mahlzeiten `;
  if(isAlex||isBoth) summaryText+=`💪 Alex: ${alexCount} Mahlzeiten`;

  let html=`<div class="week-summary ${summaryClass}">${summaryText}</div>`;
  const catOrder=['Protein','Fisch','Gemüse','Milchprodukte','Obst & Beeren','Vorrat','Öle & Würzen','Snacks','Kräuter'];
  const cats=[...catOrder.filter(c=>merged[c]),...Object.keys(merged).filter(c=>!catOrder.includes(c))];
  const catClass=isAlex?'cat-alex':isBoth?'cat-both':'cat-ina';
  cats.forEach(cat=>{
    if(!merged[cat])return;
    html+=`<div class="shopping-category"><div class="shopping-cat-title ${catClass}">${cat}</div>`;
    Object.entries(merged[cat]).forEach(([item,count])=>{
      const key=cat+'_'+item;
      const checked=checkedItems[key]?'checked':'';
      html+=`<div class="shopping-item ${checked}" onclick="toggleItem('${key}',this)"><div class="shopping-checkbox"></div><span class="shopping-item-name">${item}</span>${count>1?`<span class="shopping-item-amount">${count}×</span>`:''}</div>`;
    });
    html+='</div>';
  });
  html+=`<button class="clear-btn" onclick="clearPlan()">🗑️ Wochenplan zurücksetzen</button>`;
  inner.innerHTML=html;
}

function toggleItem(key,el){checkedItems[key]=!checkedItems[key];el.classList.toggle('checked');}
function clearPlan(){
  if(confirm('Wochenplan zurücksetzen?')){
    tage.forEach(t=>{wochenplanIna[t]={fruehstueck:null,snack:null,mittag:null,abend:null};wochenplanAlex[t]={fruehstueck:null,snack:null,mittag:null,abend:null};});
    checkedItems={};savePlan();renderPlaner();renderShopping();
  }
}


// Expose to window for Firebase sync
window.alleRezepte = alleRezepte;
window._prefsIna = prefsIna;
window._prefsAlex = prefsAlex;
window._wochenplanIna = wochenplanIna;
window._wochenplanAlex = wochenplanAlex;
window.renderRezepte = renderRezepte;
window.renderPlaner = renderPlaner;
window.renderEntdecken = renderEntdecken;
window.renderShopping = renderShopping;

// Sync functions so Firebase can update actual app variables
window.syncPrefsIna = function(data) {
  Object.keys(prefsIna).forEach(k => delete prefsIna[k]);
  Object.assign(prefsIna, data);
};
window.syncPrefsAlex = function(data) {
  Object.keys(prefsAlex).forEach(k => delete prefsAlex[k]);
  Object.assign(prefsAlex, data);
};
window.syncWochenplanIna = function(data) {
  Object.keys(wochenplanIna).forEach(k => delete wochenplanIna[k]);
  Object.assign(wochenplanIna, data);
};
window.syncWochenplanAlex = function(data) {
  Object.keys(wochenplanAlex).forEach(k => delete wochenplanAlex[k]);
  Object.assign(wochenplanAlex, data);
};
// INIT
renderRezepte();
renderPlaner();
</script>
